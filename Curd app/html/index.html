<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container mt-5">
    <h2 class="text-center mb-4">Menu Management System</h2>

    <!-- FORM -->
    <form id="menuForm" class="row g-3 justify-content-center">
      <div class="col-md-5">
        <input type="text" id="name" class="form-control" placeholder="Menu Name">
      </div>

      <div class="col-md-5">
        <input type="number" id="price" class="form-control" placeholder="Price">
      </div>

      <div class="col-12 text-center">
        <button type="button" onclick="saveMenu()" class="btn btn-success px-4">Save</button>
      </div>
    </form>

    <!-- SEARCH -->
    <div class="row mt-4 justify-content-center">
      <div class="col-md-6">
        <input type="text" id="search" class="form-control" placeholder="Search menu">
      </div>
    </div>

    <!-- MESSAGE -->
    <div id="msg" class="text-center mt-3"></div>

    <!-- TABLE -->
    <div id="menuTable" class="mt-4"></div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Menu Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="detailName"></p>
          <p id="detailPrice"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="../js/script.js"></script>
</body>
</html>
